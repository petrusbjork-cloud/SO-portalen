<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekonomi – Interaktiv Lärobok</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0f1a;--bg2:#111827;--bg3:#1a2236;--bg4:#222d44;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#38bdf8;--accent2:#818cf8;--accent3:#f472b6;--accent4:#34d399;--accent5:#fbbf24;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.08);
  --radius:12px;--radius2:16px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* === NAV SIDEBAR === */
.nav{position:fixed;top:0;left:0;width:280px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s ease}
.nav-header{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.nav-header h1{font-family:'DM Serif Display',serif;font-size:1.3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-header p{font-size:.75rem;color:var(--text3);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.nav-links{flex:1;overflow-y:auto;padding:12px}
.nav-link{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius);color:var(--text2);text-decoration:none;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-link:hover{background:var(--glass2);color:var(--text)}
.nav-link.active{background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(129,140,248,.12));color:var(--accent);border:1px solid rgba(56,189,248,.2)}
.nav-num{width:28px;height:28px;border-radius:8px;background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.nav-link.active .nav-num{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg)}
.nav-progress{padding:16px 24px;border-top:1px solid var(--border)}
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s ease;width:0%}
.progress-text{font-size:.7rem;color:var(--text3);margin-top:6px}

/* === HAMBURGER === */
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:44px;height:44px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.hamburger span{width:20px;height:2px;background:var(--text);border-radius:1px;transition:.3s}

/* === MAIN === */
.main{margin-left:280px;min-height:100vh}
.section{display:none;animation:fadeIn .4s ease}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* === HERO per section === */
.section-hero{padding:60px 48px 40px;position:relative;overflow:hidden}
.section-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:.15;pointer-events:none}
.section-hero.c1::before{background:var(--accent)}
.section-hero.c2::before{background:var(--accent2)}
.section-hero.c3::before{background:var(--accent3)}
.section-hero.c4::before{background:var(--accent4)}
.section-hero.c5::before{background:var(--accent5)}
.section-hero.c6::before{background:#f97316}
.section-hero.c7::before{background:#a78bfa}
.section-hero.c8::before{background:#2dd4bf}
.section-hero.c9::before{background:var(--accent3)}
.section-tag{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:20px;margin-bottom:16px}
.section-hero h2{font-family:'DM Serif Display',serif;font-size:2.4rem;line-height:1.2;max-width:700px}
.section-hero .subtitle{color:var(--text2);font-size:1.05rem;margin-top:12px;max-width:600px}

/* === CONTENT === */
.content{padding:0 48px 48px;max-width:900px}
.content h3{font-family:'DM Serif Display',serif;font-size:1.5rem;margin:36px 0 16px;color:var(--text)}
.content h4{font-size:1.1rem;font-weight:600;margin:24px 0 10px;color:var(--accent)}
.content p{color:var(--text2);margin-bottom:18px;font-size:1rem;line-height:1.8}
.content ul{list-style:none;padding:0;margin-bottom:16px}
.content ul li{position:relative;padding-left:20px;margin-bottom:8px;color:var(--text2);font-size:.95rem}
.content ul li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700}

/* === INFO CARDS === */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:24px 0}
.info-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;transition:all .3s}
.info-card:hover{border-color:rgba(56,189,248,.3);transform:translateY(-2px)}
.info-card h5{font-size:.9rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.info-card p{font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:0}
.info-card .icon{font-size:1.6rem;margin-bottom:10px}

/* === INTERACTIVE WIDGETS === */
.widget{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;margin:36px 0}
.widget-title{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:6px}
.widget-sub{font-size:.82rem;color:var(--text3);margin-bottom:20px}
.slider-group{margin:16px 0}
.slider-group label{display:flex;justify-content:space-between;font-size:.85rem;color:var(--text2);margin-bottom:8px}
.slider-group label span{color:var(--accent);font-weight:600;font-family:'JetBrains Mono',monospace}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--bg4);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;box-shadow:0 0 12px rgba(56,189,248,.4)}

/* === KRETSLOPP === */
.kretslopp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.kretstab{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;cursor:pointer;transition:all .3s;text-align:center}
.kretstab:hover,.kretstab.active{border-color:var(--accent2);background:rgba(129,140,248,.08)}
.kretstab .k-icon{font-size:2rem;margin-bottom:8px}
.kretstab h5{font-size:.9rem;margin-bottom:4px}
.kretstab p{font-size:.78rem;color:var(--text3);margin-bottom:0}
.kretstab-detail{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:12px;font-size:.88rem;color:var(--text2);line-height:1.7;display:none}
.kretstab-detail.show{display:block;animation:fadeIn .3s ease}

/* === QUIZ === */
.quiz-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:32px;margin:48px 0 20px 0}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.quiz-header h3{font-family:'DM Serif Display',serif;font-size:1.3rem;margin:0}
.quiz-score{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent);background:rgba(56,189,248,.1);padding:6px 14px;border-radius:20px}
.quiz-progress{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:24px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.quiz-question{font-size:1.05rem;font-weight:600;margin-bottom:20px;line-height:1.5}
.quiz-q-num{font-size:.7rem;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-option{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text2)}
.quiz-option:hover:not(.disabled){border-color:var(--accent);background:rgba(56,189,248,.06);color:var(--text)}
.quiz-option.correct{border-color:var(--accent4)!important;background:rgba(52,211,153,.12)!important;color:var(--accent4)!important}
.quiz-option.wrong{border-color:var(--accent3)!important;background:rgba(244,114,182,.08)!important;color:var(--accent3)!important}
.quiz-option.disabled{pointer-events:none;opacity:.7}
.quiz-feedback{margin-top:16px;padding:14px;border-radius:var(--radius);font-size:.88rem;line-height:1.6;display:none}
.quiz-feedback.show{display:block;animation:fadeIn .3s}
.quiz-feedback.correct-fb{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:var(--accent4)}
.quiz-feedback.wrong-fb{background:rgba(244,114,182,.08);border:1px solid rgba(244,114,182,.2);color:var(--accent3)}
.quiz-nav{display:flex;justify-content:space-between;margin-top:24px}
.quiz-btn{padding:10px 24px;border-radius:var(--radius);border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.quiz-btn:hover{border-color:var(--accent);background:rgba(56,189,248,.08)}
.quiz-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:var(--bg)}
.quiz-results{text-align:center;padding:40px 20px}
.quiz-results .big-score{font-family:'DM Serif Display',serif;font-size:3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.quiz-results p{color:var(--text2);margin-top:8px}

/* === MEGA QUIZ CHECKBOXES === */
.mq-cb-label{display:flex;align-items:center;gap:12px;background:var(--glass);padding:14px 18px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:all .2s;color:var(--text2);font-size:.9rem}
.mq-cb-label:hover{border-color:var(--accent);background:rgba(56,189,248,.06);color:var(--text)}
.mq-cb-label input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}

/* === BEGREPPSTRÄNING === */
.training-tabs { display:flex; gap:12px; margin-bottom:32px; flex-wrap:wrap; border-bottom:1px solid var(--border); padding-bottom:16px; }
.train-tab { padding:10px 20px; border-radius:var(--radius); border:1px solid transparent; background:transparent; color:var(--text3); font-weight:600; cursor:pointer; transition:all 0.2s; font-size:0.9rem; }
.train-tab:hover { color:var(--text); }
.train-tab.active { background:var(--glass2); color:var(--accent); border:1px solid rgba(56,189,248,0.2); }

.train-area { display:none; animation:fadeIn 0.4s ease; flex-direction:column; align-items:center; width:100%; }
.train-area.active { display:flex; }

/* Flashcards */
.flash-controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;justify-content:center;width:100%;}
.flash-filter{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--glass);color:var(--text2);cursor:pointer;font-size:.8rem;font-weight:500;transition:all .2s}
.flash-filter:hover,.flash-filter.active{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.08)}
.flashcard-container{display:flex;flex-direction:column;align-items:center;gap:20px;margin:10px 0;width:100%;}
.flashcard{width:100%;max-width:600px;height:300px;perspective:1000px;cursor:pointer}
.flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s ease}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.flashcard-front{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border)}
.flashcard-front h3{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:12px;color:var(--text)}
.flashcard-front p{font-size:.85rem;color:var(--text3);margin-bottom:0;text-transform:uppercase;letter-spacing:1px;}
.flashcard-back{background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(129,140,248,.1));border:1px solid rgba(56,189,248,.2);transform:rotateY(180deg)}
.flashcard-back p{font-size:1.05rem;color:var(--text);line-height:1.7;margin-bottom:0}
.flash-nav{display:flex;align-items:center;gap:20px}
.flash-nav button{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--glass);color:var(--text);cursor:pointer;font-size:1.1rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.flash-nav button:hover{border-color:var(--accent);background:rgba(56,189,248,.08)}
.flash-counter{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--text3)}
.flash-hint{font-size:.8rem;color:var(--text3);margin-top:4px}

/* Match Game */
.match-grid { display:flex; gap:20px; justify-content:center; width:100%; margin-bottom:24px; flex-wrap:wrap;}
@media(max-width:768px) { .match-grid { flex-direction:column; } }
.match-col { display:flex; flex-direction:column; gap:12px; flex:1; min-width:280px;}
.match-btn { padding:16px 20px; background:var(--glass); border:1px solid var(--border); border-radius:var(--radius); color:var(--text2); cursor:pointer; text-align:left; transition:all 0.2s; font-size:0.95rem; line-height:1.5;}
.match-btn:hover { border-color:var(--accent); color:var(--text); background:var(--glass2);}
.match-btn.term { font-weight:700; font-size:1.05rem; color:var(--text); text-align:center;}
.match-btn.selected { border-color:var(--accent); background:rgba(56,189,248,0.15); box-shadow:0 0 10px rgba(56,189,248,0.3); color:var(--text);}
.match-btn.correct { background:rgba(52,211,153,0.15); border-color:var(--accent4); color:var(--accent4); pointer-events:none; opacity:0.6; }
.match-btn.wrong { animation: shake 0.4s; background:rgba(244,114,182,0.15); border-color:var(--accent3); color:var(--accent3);}

/* T/F Game */
.tf-card { background:var(--glass); border:1px solid var(--border); padding:40px; border-radius:var(--radius2); max-width:650px; width:100%; text-align:center; position:relative; }
.tf-term { font-family:'DM Serif Display',serif; font-size:2.2rem; color:var(--accent); margin-bottom:20px; }
.tf-def { font-size:1.15rem; color:var(--text); margin-bottom:40px; line-height:1.6; font-style:italic; background:var(--bg2); padding:20px; border-radius:var(--radius); border:1px solid var(--border);}
.tf-btns { display:flex; gap:20px; justify-content:center; }
.tf-btn { padding:14px 40px; border-radius:var(--radius); font-weight:700; cursor:pointer; border:none; font-size:1.1rem; transition:0.2s; flex:1; max-width:200px;}
.tf-btn.true { background:rgba(52,211,153,0.15); color:var(--accent4); border:1px solid var(--accent4); }
.tf-btn.true:hover { background:var(--accent4); color:var(--bg); }
.tf-btn.false { background:rgba(244,114,182,0.15); color:var(--accent3); border:1px solid var(--accent3); }
.tf-btn.false:hover { background:var(--accent3); color:var(--bg); }
.tf-feedback { margin-top:24px; font-size:1rem; font-weight:600; min-height:24px; padding:12px; border-radius:var(--radius); display:none;}
.tf-feedback.show { display:block; animation:fadeIn 0.3s;}
.tf-feedback.correct { background:rgba(52,211,153,0.1); color:var(--accent4); border:1px solid rgba(52,211,153,0.3);}
.tf-feedback.wrong { background:rgba(244,114,182,0.1); color:var(--accent3); border:1px solid rgba(244,114,182,0.3);}
.tf-next-btn { display:none; margin-top:24px; padding:12px 32px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:var(--radius); color:var(--bg); font-weight:700; cursor:pointer; transition:0.2s;}
.tf-next-btn:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(56,189,248,0.4);}

@keyframes shake {
  0%, 100% {transform: translateX(0);}
  20%, 60% {transform: translateX(-5px);}
  40%, 80% {transform: translateX(5px);}
}

/* Write Game */
.write-card { background:var(--glass); border:1px solid var(--border); padding:40px; border-radius:var(--radius2); max-width:650px; width:100%; text-align:center; position:relative; }
.write-def { font-size:1.15rem; color:var(--text); margin-bottom:30px; line-height:1.6; font-style:italic; background:var(--bg2); padding:20px; border-radius:var(--radius); border:1px solid var(--border); }
.write-input-container { position:relative; max-width:400px; margin:0 auto 20px; }
.write-input { width:100%; background:var(--bg2); border:2px solid var(--border); color:var(--text); font-size:1.2rem; padding:14px 20px; border-radius:var(--radius); outline:none; text-align:center; font-family:var(--serif); transition:border-color 0.2s;}
.write-input:focus { border-color:var(--accent); }
.write-btn { padding:14px 40px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:var(--radius); color:var(--bg); font-weight:700; cursor:pointer; font-size:1.1rem; transition:0.2s;}
.write-btn:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(56,189,248,0.4); }
.write-feedback { margin-top:20px; font-size:1rem; font-weight:600; padding:12px; border-radius:var(--radius); display:none; }
.write-feedback.show { display:block; animation:fadeIn 0.3s; }
.write-feedback.correct { background:rgba(52,211,153,0.1); color:var(--accent4); border:1px solid rgba(52,211,153,0.3); }
.write-feedback.wrong { background:rgba(244,114,182,0.1); color:var(--accent3); border:1px solid rgba(244,114,182,0.3); }
.write-correct-ans { font-family:var(--mono); color:var(--text); margin-top:8px; display:block; font-size:1.1rem; }

/* === TOOL BTNS === */
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.tool-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;cursor:pointer;transition:all .3s}
.tool-card:hover,.tool-card.active{transform:translateY(-2px);border-color:var(--accent)}
.tool-card h5{font-size:.9rem;margin-bottom:6px;color:var(--text)}
.tool-card p{font-size:.8rem;color:var(--text3);margin-bottom:0}
.tool-result{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;font-size:.95rem;color:var(--text2);line-height:1.7;display:none}
.tool-result.show{display:block;animation:fadeIn .3s}

/* === CHART === */
.mini-chart{display:flex;align-items:flex-end;gap:8px;height:120px;margin:20px 0;padding:12px;border-bottom:1px solid var(--border)}
.chart-bar{flex:1;border-radius:6px 6px 0 0;transition:height .6s ease;position:relative;min-width:30px}
.chart-bar .bar-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:.65rem;color:var(--text3);white-space:nowrap}
.chart-bar .bar-val{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--text2);font-family:'JetBrains Mono',monospace}

/* === RESPONSIVE === */
@media(max-width:768px){
  .nav{transform:translateX(-100%)}
  .nav.open{transform:translateX(0)}
  .hamburger{display:flex}
  .main{margin-left:0}
  .section-hero{padding:80px 24px 32px}
  .section-hero h2{font-size:1.7rem}
  .content{padding:0 24px 36px}
  .info-grid{grid-template-columns:1fr}
  .kretslopp-grid{grid-template-columns:1fr}
  .tool-grid{grid-template-columns:1fr}
  .quiz-container{padding:20px}
  .widget{padding:20px}
}

/* === OVERLAY for mobile nav === */
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.nav-overlay.show{display:block}

/* Comparison table */
.compare-table{width:100%;border-collapse:collapse;margin:24px 0;font-size:.9rem}
.compare-table th,.compare-table td{padding:14px 16px;border:1px solid var(--border);text-align:left}
.compare-table th{background:var(--glass);color:var(--accent);font-weight:600;font-size:.8rem;letter-spacing:.5px;text-transform:uppercase}
.compare-table td{color:var(--text2)}
.compare-table tr:hover td{background:var(--glass2)}

/* Highlight box */
.highlight-box{background:linear-gradient(135deg,rgba(56,189,248,.06),rgba(129,140,248,.06));border-left:3px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0;padding:24px;margin:28px 0;font-size:.95rem;color:var(--text2);line-height:1.7}
.highlight-box strong{color:var(--text);font-size:1.05rem;display:block;margin-bottom:8px}

    <h3>Vad är egentligen ekonomi?</h3>
    <p>När du hör ordet "ekonomi" tänker du säkert på pengar, bankkort och prislappar. Men ordet <strong>ekonomi</strong> kommer faktiskt från grekiskan och betyder "hushållning". Det handlar i grund och botten om att vi människor har <em>oändliga behov och önskningar</em>, men jordens resurser (skog, olja, arbetskraft, tid) är <em>begränsade</em>. Ekonomi är vetenskapen om hur vi på smartast möjliga sätt hushållar med dessa begränsade resurser.</p>
    <p>För att lösa detta måste varje samhälle, från en liten by till hela världen, bygga upp ett <strong>ekonomiskt system</strong>. Detta system måste ständigt svara på tre grundläggande frågor: <em>Vad</em> ska vi producera? <em>Hur</em> ska vi producera det? Och <em>för vem</em> producerar vi?</p>

    <h3>De fyra ekonomiska systemen</h3>
    <p>Genom historien har människan prövat olika sätt att styra ekonomin. Man brukar dela in dem i fyra huvudgrupper, även om verkligheten ofta är en mix av dessa.</p>
    <div class="info-grid">
      <div class="info-card"><div class="icon">🏪</div><h5>Marknadsekonomi</h5><p>Köpare och säljare styr vad som tillverkas och vad det kostar genom fri konkurrens. Staten lägger sig inte i.</p></div>
      <div class="info-card"><div class="icon">🏛️</div><h5>Planekonomi</h5><p>Staten håller i taktpinnen. Myndigheter planerar i förväg exakt vad fabrikerna ska tillverka och sätter alla priser.</p></div>
      <div class="info-card"><div class="icon">♻️</div><h5>Kretsloppsekonomi</h5><p>Ett system där miljöns gränser sätter spelreglerna. Saker ska designas för att återanvändas, inte slängas.</p></div>
      <div class="info-card"><div class="icon">🔀</div><h5>Blandekonomi</h5><p>Sveriges system! En mix där marknaden (företagen) styr det mesta, men staten sätter regler, tar in skatt och sköter vård och skola.</p></div>
    </div>

    <h3>Utbud & efterfrågan – den osynliga handen</h3>
    <p>I en marknadsekonomi är det ingen chef som bestämmer vad en liter mjölk ska kosta. Priset bestäms istället av ett ständigt dragkamp mellan <strong>utbud</strong> (hur mycket mjölk bonden kan och vill sälja) och <strong>efterfrågan</strong> (hur mycket mjölk vi kunder vill köpa). Ekonomen Adam Smith kallade detta för marknadens "osynliga hand".</p>
    <p>När köparens vilja att betala exakt matchar säljarens vilja att sälja, uppstår det magiska <strong>jämviktspriset</strong>. Men om något händer i omvärlden rubbas balansen omedelbart. Prova själv i simulatorn här nedanför!</p>

      </div>
    </div>

    <h3>När marknaden blir galen: Jordgubbar & O'boy</h3>
    <p>Den här dragkampen sker varje dag, runt omkring oss, ibland med helt galna resultat. Här är två klassiska exempel som visar hur starka marknadens krafter är i verkligheten:</p>
    <div class="highlight-box">
      <strong>🍓 Jordgubbar vid midsommar:</strong> Veckan innan midsommar är efterfrågan på färska svenska jordgubbar enorm. Alla vill ha dem till tårtan! Men utbudet (skörden) är begränsat. Resultatet? Säljarna kan ta hutlöst betalt och folk köper ändå. Senare på sommaren är skördarna gigantiska (stort utbud) men folk har tröttnat lite (låg efterfrågan) – då rasar priset och du kan köpa tre liter för en tjuga!<br><br>
      <strong>☕ O'boy-krisen 2018:</strong> Minns du när O'boy försvann från hyllorna? Tekniska problem i fabriken stoppade produktionen helt. Utbudet kraschade plötsligt till noll, medan den enorma efterfrågan fanns kvar. Eftersom varan blev extremt sällsynt, exploderade priset. Folk sålde till och med halvöppna O'boy-paket för flera hundra kronor på nätet!
    </div>

    ${buildQuizHTML('del1')}
  </div></div>`;
}

function buildDel3(){
  const s=sections[2];
  return `<div class="section ${s.id===currentSection?'active':''}" id="sec-${s.id}">
  ${sHero(s,'Ekonomins vågrörelse – från brinnande boom till iskall kris')}
  <div class="content">
    <h3>Ekonomi är egentligen psykologi</h3>
    <p>Man skulle kunna tro att ekonomi bara handlar om matematik och kalkyler. Men sanningen är att ekonomi till stor del styrs av mänskliga känslor – närmare bestämt <strong>optimism</strong> och <strong>rädsla</strong>. När människor tror på framtiden vågar de spendera pengar, men när de blir rädda håller de hårt i plånboken. Detta flockbeteende skapar en evig vågrörelse i samhällsekonomin som kallas för <strong>konjunkturer</strong>.</p>

    <h3>Högkonjunktur – festen är igång</h3>
    <p>I en högkonjunktur är framtidstron stark. Företagen går med vinst, de anställer fler människor, och arbetslösheten pressas ner. Eftersom många har jobb och känner sig trygga, köper de nya bilar, bygger altaner och går på restaurang. Efterfrågan är skyhög!</p>
    <div class="info-grid">
      <div class="info-card"><div class="icon">📈</div><h5>Hög efterfrågan</h5><p>Folk vill handla. Fabrikerna får massor av beställningar och snurrar dygnet runt.</p></div>
      <div class="info-card"><div class="icon">💼</div><h5>Låg arbetslöshet</h5><p>Eftersom företagen måste tillverka så mycket, måste de anställa i stort sett alla som kan jobba.</p></div>
      <div class="info-card"><div class="icon">💰</div><h5>Stigande priser</h5><p>När alla har pengar och vill köpa (hög efterfrågan), kan företagen passa på att höja sina priser.</p></div>
      <div class="info-card"><div class="icon">⚠️</div><h5>Inflationsrisk</h5><p>Baksidan av festen! Om priserna sticker iväg för snabbt, tappar pengarna i värde. Detta kallas inflation.</p></div>
    </div>

    <h3>Inflation och löne-prisspiralen</h3>
    <p><strong>Inflation</strong> betyder att den allmänna prisnivån i landet stiger. Dina pengar blir bokstavligen mindre värda. En biobiljett som kostade 25 kronor för trettio år sedan kostar idag 150 kronor – inte för att filmen blivit sex gånger bättre, utan för att kronan tappat i värde genom inflation.</p>
    <p>Om inflationen drar iväg under en högkonjunktur riskerar vi att hamna i en farlig fälla som kallas <strong>löne-prisspiralen</strong>:</p>
    <div class="highlight-box">
      <strong>Så fungerar löne-prisspiralen:</strong><br>
      När priset på mat och hyra plötsligt blir mycket dyrare, blir arbetarna arga och kräver högre löner av sina chefer för att klara sin vardag. Företagen går med på att höja lönerna, men för att ha råd med de nya, dyra lönerna måste de höja priset på sina varor ytterligare. Då blir det ännu dyrare i matbutiken, varpå arbetarna kräver <em>ännu</em> mer i lön. Spiralen snurrar obönhörligt uppåt och inflationen skenar!
    </div>

    <h3>Lågkonjunktur & den onda cirkeln</h3>
    <p>Men ingen fest varar för evigt. Kanske skenar inflationen, kanske kraschar börsen i USA, eller kanske blir folk bara mätta och slutar konsumera. Rädsla sprider sig. Folk slutar köpa nya bilar och äter havregrynsgröt istället för restaurangmat. Vågrörelsen vänder nedåt – vi går in i en <strong>lågkonjunktur</strong>.</p>
    <p>Här är det oerhört lätt att ekonomin fastnar i vad som kallas den "onda cirkeln".</p>

    <div class="onda-circle">
      <div class="onda-step"><span class="onda-num">1</span><span class="onda-text"><strong>Minskad efterfrågan</strong><br>Folk blir försiktiga. Istället för att köpa en ny soffa, lagar de den gamla. De slutar spendera.</span></div>
      <div class="onda-step"><span class="onda-num">2</span><span class="onda-text"><strong>Färre varor säljs</strong><br>Soffbutiken och möbelfabriken märker direkt att ingen ringer och beställer längre. Lagren fylls av osålda soffor.</span></div>
      <div class="onda-step"><span class="onda-num">3</span><span class="onda-text"><strong>Minskad produktion</strong><br>Fabriken stänger av maskinerna. Varför tillverka soffor som ingen vill ha?</span></div>
      <div class="onda-step"><span class="onda-num">4</span><span class="onda-text"><strong>Uppsägningar och arbetslöshet</strong><br>Fabriken har inte råd att betala sina arbetare när de inte säljer något. Människor får sparken.</span></div>
      <div class="onda-step"><span class="onda-num">5</span><span class="onda-text"><strong>Ännu mindre pengar i kretsloppet</strong><br>Nu när arbetarna blivit arbetslösa har de ännu mindre pengar att spendera. De slutar gå till frisören och köpa kläder, vilket drar med sig frisören och klädbutiken in i krisen. Cirkeln börjar om, ännu starkare.</span></div>
    </div>

    <p>När lågkonjunkturen slår till hamnar den offentliga sektorn (staten) i en rävsax. Eftersom folk tjänar mindre och företag går i konkurs, får staten in mycket mindre pengar i <strong>skatt</strong>. Men samtidigt exploderar statens <strong>utgifter</strong>, eftersom alla tusentals nya arbetslösa måste få arbetslöshetsersättning (a-kassa) och bidrag. Det är här statens verktygslåda måste öppnas upp för att rädda landet.</p>

    ${buildQuizHTML('del3')}
  </div></div>`;
}

    <p>Tänk dig att Sverige hamnar i en iskall lågkonjunktur. Folk är arbetslösa och ingen vågar handla. Den onda cirkeln snurrar. Då kan regeringen trycka på "gasen" genom finanspolitiken! De kan till exempel <strong>sänka skatterna</strong> (så folk får mer pengar kvar i plånboken att handla för) eller <strong>investera statliga miljarder</strong> i att bygga en ny järnväg. Plötsligt måste byggföretagen anställa tusentals nya vägarbetare. Dessa vägarbetare får lön, som de genast går och köper kläder och mat för, vilket räddar klädbutiken och bonden. Staten har "kickstartat" ekonomin igen!</p>
    <p>Men i en brinnande högkonjunktur måste regeringen göra precis tvärtom: Trycka på bromsen, höja skatter och spara i ladorna för att undvika överhettning.</p>

// ---------- DEL 5 ----------
function buildDel5(){
  const s=sections[4];
  return `<div class="section ${s.id===currentSection?'active':''}" id="sec-${s.id}">
  ${sHero(s,'Varför vi inte bygger egna iPhones i Sverige')}
  <div class="content">
    <h3>Varför handlar vi över gränserna?</h3>
    <p>Tänk dig om Sverige skulle försöka vara helt självförsörjande. Vi skulle behöva odla vårt eget kaffe i uppvärmda växthus på vintern, och vi skulle behöva bygga våra egna mobiltelefoner och datorer från grunden i små svenska fabriker. En enda "Sverige-telefon" skulle förmodligen kosta 150 000 kronor och vara stor som en tegelsten, eftersom vi varken har rätt råvaror eller massproduktionens fördelar. Och kaffet skulle smaka fruktansvärt.</p>
    <p>Det är här den internationella handeln kommer in. Kärnan i all världshandel handlar om <strong>specialisering</strong>. Länder är bra på olika saker tack vare klimat, naturtillgångar och utbildningsnivå. Genom att varje land fokuserar på att <strong>exportera</strong> det de är absolut bäst på (och sälja det utomlands), får de in pengar. Dessa pengar används sedan till att <strong>importera</strong> de varor som andra länder gör bättre eller billigare. Alla vinner på bytet!</p>

    <h3>Frihandel vs Protektionism</h3>
    <p>Historiskt sett försökte kungar bygga murar runt sina länder och sätta höga <strong>tullar</strong> (en extra avgift på utländska varor) för att skydda sina egna bönder och smeder från utländsk konkurrens. Detta kallas <em>protektionism</em>.</p>
    <p>Idag bygger den moderna ekonomin på <strong>Frihandel</strong>. Frihandel innebär att man tar bort tullar och handelshinder helt och hållet, så att varor kan röra sig fritt över gränserna. För att se till att detta fungerar och att stora länder inte mobbar små, grundades <strong>WTO (Världshandelsorganisationen)</strong> 1995. De sätter upp spelreglerna för den globala handeln.</p>

    <h3>Valutan – nyckeln till priset</h3>
    <p>Ett stort problem när vi handlar med världen är att vi inte har samma pengar. I Sverige har vi kronor (SEK), i Tyskland Euro (EUR) och i USA dollar (USD). En <strong>valutakurs</strong> är priset på hur många kronor det kostar att köpa en utländsk peng.</p>
    <p>Om den svenska kronan tappar i värde (blir svag) mot utländska valutor, får det gigantiska konsekvenser för svensk industri och vår vardag. En svag krona gör det otroligt dyrt för dig att köpa en importerad iPhone eller åka på semester till Spanien. Men för Volvos fabrik i Göteborg är det julafton! Deras lastbilar blir plötsligt jättebilliga för amerikaner att köpa, vilket gör att Volvos <strong>export</strong> exploderar. Testa själv i simulatorn:</p>

    <div class="widget">
      <div class="widget-title">💱 Valutasimulatorn</div>
      <div class="widget-sub">Lek med kronkursen. Vad händer med en svensk maskin som Volvo säljer för 1 000 svenska kronor till USA?</div>
      <div class="slider-group">
        <label>Kronans värde (Hur många kr kostar 1 Dollar?) <span id="fxVal">1 USD = 10 SEK</span></label>
        <input type="range" min="6" max="16" value="10" oninput="updateFx()" id="fxSlider">
      </div>
      <div style="display:flex;gap:16px;margin-top:16px;flex-wrap:wrap">
        <div class="info-card" style="flex:1;min-width:200px"><h5>Priset för den amerikanska köparen</h5><p id="fxPrice" style="font-family:'JetBrains Mono',monospace;font-size:1.3rem;color:var(--accent)">$100</p><p id="fxExplain" style="font-size:.78rem;color:var(--text3)">Normalpris</p></div>
        <div class="info-card" style="flex:1;min-width:200px"><h5>Effekt på svensk export</h5><p id="fxEffect" style="font-size:.85rem; line-height: 1.5;">Neutral – kronan är stabil. Handeln flyter på som vanligt.</p></div>
      </div>
    </div>

    ${buildQuizHTML('del5')}
  </div></div>`;
}

// ---------- DEL 6 ----------
function buildDel6(){

  return `<div class="section ${s.id===currentSection?'active':''}" id="sec-${s.id}">
  ${sHero(s,'Skog, stål och snilleblixtar – så blev vi ett rikt land')}
  <div class="content">
    <h3>Lilla landet lagom i stora världen</h3>
    <p>För 150 år sedan var Sverige ett av Europas fattigaste länder, ett iskallt bondesamhälle där missväxt och svält tvingade en miljon svenskar att fly till Amerika. Idag är vi ett av världens rikaste och mest utvecklade länder. Hur gick det till? Svaret stavas <strong>internationell handel</strong>.</p>
    <p>Sverige har en <strong>liten men extremt öppen ekonomi</strong>. Eftersom vi bara är cirka tio miljoner invånare, är vår inhemska marknad alldeles för liten för att företag som Ericsson, Spotify, IKEA eller Volvo ska kunna växa sig stora här hemma. De måste ut i världen från dag ett.</p>

    <h3>Vad vi säljer (Export) och vad vi köper (Import)</h3>
    <p>Historiskt byggde vår rikedom på våra råvaror: Skog, Järnmalm och Vattenkraft. Storbritannien och Tyskland skrek efter svenskt virke och stål för att bygga upp sina egna industrier. Idag ser det lite annorlunda ut. Vi exporterar förvisso fortfarande massor av papper och stål, men den stora guldgruvan idag är <strong>högteknologiska maskiner, fordon (lastbilar), läkemedel och tjänster (som IT och musik)</strong>.</p>
    <p>Samtidigt <strong>importerar</strong> vi enorma mängder varor. Eftersom vi har kalla vintrar och saknar vissa naturtillgångar, måste vi importera all vår olja (för transport och plast), stora mängder elektronik (datorer, telefoner) och mycket av maten i våra matbutiker (som kaffe och exotiska frukter).</p>

      <div class="info-card"><div class="icon">🇪🇺</div><h5>Europa är navet</h5><p>Vi säljer inte mest till Kina eller USA, utan till våra grannar! Ungefär 70% av hela vår handel sker inom Europa.</p></div>
      <div class="info-card"><div class="icon">📊</div><h5>Handelsöverskott</h5><p>Sverige är en vinnare. Vi exporterar (säljer) vanligtvis för mycket mer pengar än vad vi importerar (köper) för.</p></div>

    <h3>Sveriges bästa vänner i handeln</h3>

    <div class="mini-chart" id="tradeChart"></div>
    <p style="font-size:.8rem;color:var(--text3);text-align:center">Ett urval av Sveriges viktigaste handelspartners. Notera hur våra nordiska och europeiska grannar dominerar totalt.</p>

    ${buildQuizHTML('del6')}
  </div></div>`;
}

// ---------- DEL 7 ----------
function buildDel7(){
  const s=sections[6];
  return `<div class="section ${s.id===currentSection?'active':''}" id="sec-${s.id}">
  ${sHero(s,'När världen krymper och tröjan reser 10 000 mil')}
  <div class="content">
    <h3>Ett globalt spindelnät</h3>
    <p>Nästa gång du tar på dig en t-shirt eller startar din telefon, tänk på dess resa. Bomullen i tröjan kanske odlades i Indien, spanns till tråd i Kina, vävdes och syddes ihop i Bangladesh, fick sitt tryck i Turkiet, innan den till slut skeppades till en butik i Sverige. Detta är <strong>Globalisering</strong> i praktiken – hur varor, tjänster, pengar, information och människor rör sig allt snabbare och friare över nationsgränserna.</p>
    <p>Globaliseringen har exploderat sedan 1990-talet, driven av containervarv, internet och frihandelsavtal. Tack vare detta har <strong>världens samlade BNP nästan tredubblats</strong> på bara trettio år. Hundratals miljoner människor i Asien har lyfts ur extrem fattigdom eftersom de fått fabriksjobb när västerländska företag flyttat sin produktion dit.</p>

    <h3>Kina – Den nya supermakten</h3>
    <p>I slutet av 1900-talet dominerades världsekonomin fullständigt av USA och Västeuropa. Idag har spelplanen ritats om. <strong>Kina</strong> har haft en obegriplig ekonomisk tillväxt och är idag världens näst största ekonomi och den obestridda "världens fabrik".</p>
    <p>Kinas inflytande stannar inte i Asien. Kina investerar nu massivt i infrastrukturen i stora delar av <strong>Afrika</strong> (byggande av hamnar, vägar och järnvägar) i utbyte mot tillgång till afrikanska naturtillgångar (som kobolt och olja). För Afrika innebär det en chans till utveckling och integration i den globala ekonomin, men Kina får också ofta kritik. Deras jätteprojekt anklagas ofta för att blunda för miljöförstöring och för att sätta afrikanska länder i farliga skuldfällor.</p>

    <h3>De mörka baksidorna</h3>
    <p>Globaliseringen är inte bara en solskenshistoria. Den hyper-sammankopplade världen har skapat stora problem och sårbarheter som vi kämpar med idag.</p>
    <div class="info-grid">
      <div class="info-card"><div class="icon">⚖️</div><h5>Klyftorna spricker upp</h5><p>Samtidigt som världen som helhet blivit rikare, har globaliseringen gjort de superrika astronomiskt mycket rikare, medan arbetarklassen i västvärlden ofta förlorat sina industrijobb till låglöneländer.</p></div>
      <div class="info-card"><div class="icon">🌊</div><h5>Dominoteffekten</h5><p>När ett land nyser, blir hela världen förkyld. En bolånekris i USA (2008) eller ett krig i Ukraina (2022) sprider genast chockvågor och inflation genom hela det globala nätverket.</p></div>
      <div class="info-card"><div class="icon">🌍</div><h5>Miljön betalar priset</h5><p>Att skeppa miljarder ton med billiga plastleksaker och fast-fashion-kläder över världshaven, ofta från fabriker med obefintliga miljökrav, skapar massiva utsläpp och klimathot.</p></div>
    </div>

    ${buildQuizHTML('del7')}
  </div></div>`;
}

// ---------- DEL 8 ----------
function buildDel8(){
  const s=sections[7];
  return `<div class="section ${s.id===currentSection?'active':''}" id="sec-${s.id}">
  ${sHero(s,'Kan man mäta lycka med en miniräknare?')}
  <div class="content">
    <h3>BNP – En trubbig prislapp på ett land</h3>
    <p>När politiker och tidningar pratar om hur bra det går för Sverige, pratar de nästan alltid om <strong>BNP (Bruttonationalprodukten)</strong>. BNP är helt enkelt det sammanlagda prislappen på absolut allt som tillverkas, säljs och klipps (tjänster) i ett land under ett år. Om BNP växer, säger vi att vi har ekonomisk tillväxt.</p>
    <p>Om man vill jämföra länders rikedom med varandra är det bättre att använda <strong>BNP per capita</strong>. Då tar man hela den där stora prislappen och delar den med antalet invånare, så att ett stort land som Kina kan jämföras rättvist med ett litet land som Norge.</p>
    
    <div class="highlight-box">
      <strong>Men BNP ljuger (lite grann)...</strong><br>
      Problemet med BNP är att det är helt hjärtlöst. Det mäter bara pengar i rörelse. Om en oljetanker sjunker och förstör den svenska kusten, och staten måste anställa tusentals människor för att städa upp oljan och köpa in dyra saneringsmaskiner – då <em>ökar</em> Sveriges BNP! Det ser alltså ut som att landet blivit rikare, fastän vår kust är förstörd. BNP mäter inte heller om pengarna är rättvist fördelade, om vi arbetar ihjäl oss, eller om miljön mår bra.
    </div>

    <h3>HDI – Ett mänskligare mått</h3>
    <p>Eftersom BNP var så trubbigt, tog FN på 1990-talet fram ett nytt mått kallat <strong>HDI (Human Development Index)</strong>. Istället för att bara titta på plånboken, tittar HDI på tre saker för att bedöma välståndet:</p>
    <ul style="margin-left: 16px; margin-bottom: 24px;">
      <li><strong>Ett långt och hälsosamt liv</strong> (Förväntad livslängd)</li>
      <li><strong>Tillgång till kunskap</strong> (Utbildningsnivå och hur många år man går i skolan)</li>
      <li><strong>En anständig levnadsstandard</strong> (BNP per capita för att mäta köpkraft)</li>
    </ul>

    <h3>Nya Zeeland och Bhutan vågar tänka nytt</h3>
    <p>Men räcker det med utbildning och pengar för att ett folk ska må bra? Vissa länder tycker inte det, och har börjat skapa helt nya och radikala sätt att mäta sina länders framgång.</p>
    <p>Det lilla landet <strong>Bhutan</strong> uppe i Himalaya skrotade fokus på BNP redan på 1970-talet. Istället införde kungen måttet <strong>Bruttonationallycka (GNH)</strong>. Deras politik styrs inte i första hand av vad som ger ekonomisk vinst, utan vad som bevarar landets kultur, religion och natur, och vad som gör befolkningen lycklig.</p>
    <p>Ett annat, mer modernt exempel är <strong>Nya Zeeland</strong>. De blev världskända när de övergav den traditionella statsbudgeten och införde en "Välmåendebudget". I denna budget måste varje investering och beslut som staten tar utvärderas mot fyra olika "kapital", inte bara pengar. De menar att om det sociala eller naturliga kapitalet sjunker, så är landet på väg mot en kris, oavsett vad bankkontot säger.</p>

    <table class="compare-table">
      <tr><th>Nya Zeelands 4 Kapital</th><th>Vad staten mäter och skyddar</th></tr>
      <tr><td>🤝 Socialt kapital</td><td>Invånarnas känsla av trygghet, tillit till varandra och sammanhållning i samhället.</td></tr>
      <tr><td>🧠 Mänskligt kapital</td><td>Befolkningens fysiska och mentala hälsa, samt deras utbildningsnivå och fritid.</td></tr>
      <tr><td>🌿 Naturligt kapital</td><td>Kvaliteten på skogar, vattendrag, biologisk mångfald och grön energi.</td></tr>
      <tr><td>🏗️ Finansiellt kapital</td><td>Landets plånbok: Vägar, bostäder, fabriker, inkomster och teknisk infrastruktur.</td></tr>
    </table>

    ${buildQuizHTML('del8')}
  </div></div>`;
}

          <div class="write-def" id="writeDef"></div>
          <div class="write-input-container">
              <input type="text" class="write-input" id="writeInput" placeholder="Skriv ditt svar här..." autocomplete="off" onkeyup="handleWriteKey(event)">
          </div>
          <button class="write-btn" id="writeSubmitBtn" onclick="checkWriteAnswer()">Svara</button>
          <button class="write-btn" id="writeNextBtn" onclick="nextWriteQuestion()" style="display:none;">Nästa begrepp →</button>
          <div class="write-feedback" id="writeFeedback"></div>
      </div>
    </div>

  </div></div>`;
}

// ============================================================
// QUIZ SYSTEM (Vanliga & Mega)
// ============================================================
function buildQuizHTML(key){
  const len = quizData[key] ? quizData[key].length : 0;
  return `<div class="quiz-container" id="quiz-${key}">
    <div class="quiz-header"><h3>📝 Quiz – Testa dina kunskaper!</h3><span class="quiz-score" id="qscore-${key}">0 / ${len}</span></div>
    <div class="quiz-progress"><div class="quiz-progress-fill" id="qprog-${key}"></div></div>
    <div id="qbody-${key}"></div>
  </div>`;
}

function initQuiz(key){
  quizStates[key]={current:0,score:0,answered:[]};
  renderQuestion(key);
}

function renderQuestion(key){
  const qs=quizStates[key];
  const data=quizData[key];
  const body=document.getElementById('qbody-'+key);
  
  if(qs.current>=data.length){
    completedQuizzes.add(key);
    updateProgress();
    const pct=Math.round(qs.score/data.length*100);
    let msg=pct>=80?"🎉 Fantastiskt!":pct>=50?"👍 Bra jobbat!":"📖 Läs igenom texten en gång till!";
    
    let extraBtn = key === 'mega' ? `<button class="quiz-btn" onclick="resetMegaQuiz()" style="margin-top:20px; margin-left:10px;">Bygg nytt prov</button>` : '';
    
    body.innerHTML=`<div class="quiz-results"><div class="big-score">${qs.score} / ${data.length}</div><p>${pct}% rätt – ${msg}</p><button class="quiz-btn primary" onclick="initQuiz('${key}')" style="margin-top:20px">Gör om quizet</button>${extraBtn}</div>`;
    return;
  }
  
  const q=data[qs.current];
  const prog=((qs.current)/data.length)*100;
  document.getElementById('qprog-'+key).style.width=prog+'%';
  document.getElementById('qscore-'+key).textContent=qs.score+' / '+data.length;
  body.innerHTML=`
    <div class="quiz-q-num">Fråga ${qs.current+1} av ${data.length}</div>
    <div class="quiz-question">${q.q}</div>
    <div class="quiz-options">${q.opts.map((o,i)=>`<div class="quiz-option" onclick="answerQuiz('${key}',${i})" id="qopt-${key}-${i}">${o}</div>`).join('')}</div>
    <div class="quiz-feedback" id="qfb-${key}"></div>
    <div class="quiz-nav"><div></div><button class="quiz-btn primary" id="qnext-${key}" style="display:none" onclick="nextQuestion('${key}')">Nästa →</button></div>`;
}

function answerQuiz(key,idx){
  const qs=quizStates[key];
  const q=quizData[key][qs.current];
  if(qs.answered.includes(qs.current))return;
  qs.answered.push(qs.current);
  const opts=document.querySelectorAll(`#qbody-${key} .quiz-option`);
  opts.forEach(o=>o.classList.add('disabled'));
  opts[q.ans].classList.add('correct');
  const fb=document.getElementById('qfb-'+key);
  if(idx===q.ans){
    qs.score++;
    fb.className='quiz-feedback show correct-fb';
    fb.innerHTML='✅ Rätt! '+q.fb;
  }else{
    opts[idx].classList.add('wrong');
    fb.className='quiz-feedback show wrong-fb';
    fb.innerHTML='❌ Fel. '+q.fb;
  }
  document.getElementById('qscore-'+key).textContent=qs.score+' / '+quizData[key].length;
  document.getElementById('qnext-'+key).style.display='inline-block';
}

function nextQuestion(key){
  quizStates[key].current++;
  renderQuestion(key);
}

function updateMqSliderMax() {
  const cbs = document.querySelectorAll('.mq-cb:checked');
  let t = 0;
  cbs.forEach(cb => { if(quizData[cb.value]) t += quizData[cb.value].length; });
  if(t === 0) t = 1; 
  const s = document.getElementById('mqNumSlider');
  s.max = t;
  if(parseInt(s.value) > t) s.value = t;
  document.getElementById('mqNumVal').textContent = s.value;
}

function startMegaQuiz() {
  const cbs = document.querySelectorAll('.mq-cb:checked');
  if(cbs.length === 0) { alert("Du måste välja minst ett arbetsområde!"); return; }
  
  let allQ = [];
  cbs.forEach(cb => { if(quizData[cb.value]) allQ = allQ.concat(quizData[cb.value]); });
  allQ.sort(() => Math.random() - 0.5);
  
  const num = parseInt(document.getElementById('mqNumSlider').value);
  quizData['mega'] = allQ.slice(0, num);
  
  document.getElementById('mega-quiz-setup').style.display = 'none';
  document.getElementById('mega-quiz-container').style.display = 'block';
  
  initQuiz('mega');
  document.getElementById('qbody-mega').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function resetMegaQuiz() {
  document.getElementById('mega-quiz-setup').style.display = 'block';
  document.getElementById('mega-quiz-container').style.display = 'none';
  quizData['mega'] = [];
}

// ============================================================
// BEGREPPSTRÄNING (FYRA LÄGEN)
// ============================================================
function buildFlashFilters(){
  const f=document.getElementById('flashFilters');
  if(!f)return;
  const cats=['Alla','Del 1','Del 2','Del 3','Del 4','Del 5','Del 6','Del 7','Del 8'];
  f.innerHTML=cats.map(c=>`<button class="flash-filter ${flashState.filter===c?'active':''}" onclick="filterCards('${c}')">${c}</button>`).join('');
}

function filterCards(cat){
  flashState.filter=cat;
  filteredCards=cat==='Alla'?[...flashcards]:flashcards.filter(c=>c.cat===cat);
  buildFlashFilters();
  
  // Re-initiate the current active mode
  if(flashState.mode === 'flash') { flashState.idx=0; flashState.flipped=false; renderCard(); }
  else if(flashState.mode === 'match') { initMatchGame(); }
  else if(flashState.mode === 'tf') { nextTFQuestion(); }
  else if(flashState.mode === 'write') { initWriteGame(); }
}

function switchTrainMode(mode, btnEl) {
  flashState.mode = mode;
  document.querySelectorAll('.train-tab').forEach(t=>t.classList.remove('active'));
  btnEl.classList.add('active');
  
  document.querySelectorAll('.train-area').forEach(a=>a.classList.remove('active'));
  document.getElementById('train-' + mode).classList.add('active');
  
  if(mode === 'flash') renderCard();
  if(mode === 'match') initMatchGame();
  if(mode === 'tf') nextTFQuestion();
  if(mode === 'write') initWriteGame();
}

// --- Mode 1: Flashcards ---
function renderCard(){
  const card=document.getElementById('flashcard');
  if(!card||filteredCards.length===0)return;
  card.classList.remove('flipped');
  flashState.flipped=false;
  const fc=filteredCards[flashState.idx];
  document.getElementById('fcTerm').textContent=fc.term;
  document.getElementById('fcDef').textContent=fc.def;
  document.getElementById('fcCat').textContent=fc.cat;
  document.getElementById('fcCounter').textContent=(flashState.idx+1)+' / '+filteredCards.length;
}

function flipCard(){
  flashState.flipped=!flashState.flipped;
  document.getElementById('flashcard').classList.toggle('flipped',flashState.flipped);
}
function nextCard(){ flashState.idx=(flashState.idx+1)%filteredCards.length; renderCard(); }
function prevCard(){ flashState.idx=(flashState.idx-1+filteredCards.length)%filteredCards.length; renderCard(); }
function shuffleCards(){ filteredCards.sort(()=>Math.random()-0.5); flashState.idx=0; renderCard(); }

// --- Mode 2: Match Game ---
function initMatchGame() {
  if(filteredCards.length < 2) return; // Behöver minst två kort
  document.getElementById('matchNextBtn').style.display = 'none';
  selTerm = null; selDef = null;
  
  // Plocka 4 slumpmässiga kort (eller färre om listan är liten)
  let pool = [...filteredCards].sort(()=>Math.random()-0.5).slice(0, 4);
  
  matchTerms = [...pool].sort(()=>Math.random()-0.5);
  matchDefs = [...pool].sort(()=>Math.random()-0.5);
  
  renderMatchGrid();
}

function renderMatchGrid() {
  const grid = document.getElementById('matchGrid');
  
  let termsHTML = `<div class="match-col">` + matchTerms.map(t => 
    `<button class="match-btn term" id="mTerm-${t.term.replace(/\\s/g,'')}" onclick="selectMatch('term', '${t.term}')">${t.term}</button>`
  ).join('') + `</div>`;
  
  let defsHTML = `<div class="match-col">` + matchDefs.map(d => 
    `<button class="match-btn def" id="mDef-${d.term.replace(/\\s/g,'')}" onclick="selectMatch('def', '${d.term}')">${d.def}</button>`
  ).join('') + `</div>`;
  
  grid.innerHTML = termsHTML + defsHTML;
}

function selectMatch(type, id) {
  const cleanId = id.replace(/\\s/g,'');
  
  if(type === 'term') {
    if(selTerm) document.getElementById('mTerm-'+selTerm.replace(/\\s/g,'')).classList.remove('selected');
    selTerm = id;
    document.getElementById('mTerm-'+cleanId).classList.add('selected');
  } else {
    if(selDef) document.getElementById('mDef-'+selDef.replace(/\\s/g,'')).classList.remove('selected');
    selDef = id;
    document.getElementById('mDef-'+cleanId).classList.add('selected');
  }
  
  // Check if both selected
  if(selTerm && selDef) {
    const tEl = document.getElementById('mTerm-'+selTerm.replace(/\\s/g,''));
    const dEl = document.getElementById('mDef-'+selDef.replace(/\\s/g,''));
    
    if(selTerm === selDef) {
      // Match!
      tEl.classList.remove('selected'); tEl.classList.add('correct');
      dEl.classList.remove('selected'); dEl.classList.add('correct');
      matchTerms = matchTerms.filter(t => t.term !== selTerm);
      selTerm = null; selDef = null;
      
      if(matchTerms.length === 0) {
        document.getElementById('matchNextBtn').style.display = 'inline-block';
      }
    } else {
      // Wrong!
      tEl.classList.add('wrong');
      dEl.classList.add('wrong');
      setTimeout(() => {
        tEl.classList.remove('selected', 'wrong');
        dEl.classList.remove('selected', 'wrong');
        selTerm = null; selDef = null;
      }, 500);
    }
  }
}

// --- Mode 3: True / False ---
function nextTFQuestion() {
  if(filteredCards.length < 2) return;
  document.getElementById('tfBtns').style.display = 'flex';
  document.getElementById('tfNextBtn').style.display = 'none';
  const fb = document.getElementById('tfFeedback');
  fb.className = 'tf-feedback';
  
  // Dra ett slumpmässigt kort
  tfCard = filteredCards[Math.floor(Math.random() * filteredCards.length)];
  tfIsTrue = Math.random() > 0.5;
  
  let defToShow = tfCard.def;
  if(!tfIsTrue) {
    // Dra en falsk definition
    let wrongCard = filteredCards[Math.floor(Math.random() * filteredCards.length)];
    while(wrongCard.term === tfCard.term) {
      wrongCard = filteredCards[Math.floor(Math.random() * filteredCards.length)];
    }
    defToShow = wrongCard.def;
  }
  
  document.getElementById('tfTerm').textContent = tfCard.term;
  document.getElementById('tfDef').textContent = defToShow;
}

function answerTF(userGuess) {
  document.getElementById('tfBtns').style.display = 'none';
  document.getElementById('tfNextBtn').style.display = 'inline-block';
  
  const fb = document.getElementById('tfFeedback');
  if(userGuess === tfIsTrue) {
    fb.className = 'tf-feedback show correct';
    fb.innerHTML = `✅ <strong>Helt rätt!</strong><br>` + (tfIsTrue ? `Ja, det är exakt vad ${tfCard.term} betyder.` : `Nej, det där var fel förklaring. ${tfCard.term} betyder egentligen: <em>${tfCard.def}</em>`);
  } else {
    fb.className = 'tf-feedback show wrong';
    fb.innerHTML = `❌ <strong>Tyvärr fel.</strong><br>` + (tfIsTrue ? `Jo, förklaringen stämmer faktiskt för ${tfCard.term}.` : `Den riktiga förklaringen för ${tfCard.term} är: <em>${tfCard.def}</em>`);
  }
}

// --- Mode 4: Write ---
function initWriteGame() {
  if(filteredCards.length === 0) return;
  writeCards = [...filteredCards].sort(() => Math.random() - 0.5);
  writeIdx = 0;
  loadWriteQuestion();
}

function loadWriteQuestion() {
  if(writeIdx >= writeCards.length) {
    initWriteGame();
    return;
  }
  const card = writeCards[writeIdx];
  document.getElementById('writeDef').textContent = card.def;
  const input = document.getElementById('writeInput');
  input.value = '';
  input.disabled = false;

  document.getElementById('writeSubmitBtn').style.display = 'inline-block';
  document.getElementById('writeNextBtn').style.display = 'none';
  document.getElementById('writeFeedback').className = 'write-feedback';

  setTimeout(() => input.focus(), 50);
}

function handleWriteKey(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('writeSubmitBtn').style.display !== 'none') checkWriteAnswer();
    else if (document.getElementById('writeNextBtn').style.display !== 'none') nextWriteQuestion();
  }
}

function checkWriteAnswer() {
  const input = document.getElementById('writeInput');
  const userAns = input.value.trim().toLowerCase();
  const card = writeCards[writeIdx];
  const correctAns = card.term.trim().toLowerCase();

  if(userAns === '') return;

  const possibleAnswers = [correctAns];
  if (correctAns.includes('(') && correctAns.includes(')')) {
      const mainTerm = correctAns.split('(')[0].trim();
      const subTerm = correctAns.match(/\(([^)]+)\)/)[1].trim();
      possibleAnswers.push(mainTerm, subTerm);
  }

  const isCorrect = possibleAnswers.includes(userAns);

  input.disabled = true;
  document.getElementById('writeSubmitBtn').style.display = 'none';
  document.getElementById('writeNextBtn').style.display = 'inline-block';

  const fb = document.getElementById('writeFeedback');
  if(isCorrect) {
      fb.className = 'write-feedback show correct';
      fb.innerHTML = `✅ <strong>Snyggt!</strong> Helt rätt stavat.`;
  } else {
      fb.className = 'write-feedback show wrong';
      fb.innerHTML = `❌ <strong>Inte riktigt.</strong><br><span style="font-size:0.9rem;color:var(--text2)">Rätt svar är:</span><br><span class="write-correct-ans">${card.term}</span>`;
  }
  document.getElementById('writeNextBtn').focus();
}

function nextWriteQuestion() {
  writeIdx++;
  loadWriteQuestion();
}

function goTo(id){
  currentSection=id;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

  buildNav();
  window.scrollTo(0,0);

  document.getElementById('navOverlay').classList.remove('show');
}

}

function updateProgress(){
  const baseKeys = ['del1','del2','del3','del4','del5','del6','del7','del8'];
  const total = baseKeys.length;
  let done = 0;
  baseKeys.forEach(k => { if(completedQuizzes.has(k)) done++; });
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
  document.getElementById('progressText').textContent=done+' av '+total+' quiz avklarade';
}
